openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lyrics
    description: Visual-to-lyrics retrieval
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeVisual
      tags: [lyrics]
      summary: Match lyrics to a visual
      description: >-
        Takes a precomputed, mood-agnostic visual query embedding (TinyCLIP image
        tower, computed on-device by the client), retrieves the top lyric matches
        from the catalog, and returns them as `best` (pure visual-distance order)
        plus a dynamic bucket per mood found in the results (mood is stored in
        catalog metadata).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Matches grouped by mood
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        embedding:
          type: array
          minItems: 1
          description: >-
            Precomputed mood-agnostic visual query vector (TinyCLIP image tower,
            512-dim, NOT L2-normalized), computed on-device by the client. For a
            video the client averages the per-frame vectors into one vector.
          items:
            type: number
      required:
        - embedding
    LyricMatch:
      type: object
      properties:
        lyric:
          type: string
        artist:
          type: string
        track:
          type: string
        distance:
          type: number
      required:
        - lyric
        - artist
        - track
        - distance
    AnalyzeResponse:
      type: object
      description: >-
        Matches keyed by bucket. The `best` key always holds the absolute best
        matches ordered by pure visual distance. Every other key is a mood that
        was actually retrieved from the catalog (the mood taxonomy is dynamic, so
        the set of those keys varies per request).
      properties:
        best:
          type: array
          items:
            $ref: "#/components/schemas/LyricMatch"
      required:
        - best
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/LyricMatch"

